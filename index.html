<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash SM/PG/BOT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .embed-container {
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
            background: #f8f9fa;
        }
        
        .embed-wrapper {
            width: 100%;
            max-width: 800px;
        }
        
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }
        
        footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .embed-container {
                padding: 20px;
                min-height: auto;
            }
            
            iframe {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1> Geometry Dash SM/PG/BOT </h1>
            <p>GD GAME</p>
        </header>
        
        <div class="embed-container">
            <div class="embed-wrapper">
                <iframe src="https://scratch.mit.edu/projects/228640964/embed" allowfullscreen></iframe>
            </div>
        </div>
        
        <footer>
            <p>Project created with <a href="https://scratch.mit.edu" target="_blank">Scratch</a></p>
            <p style="margin-top: 10px; font-size: 0.9em;">View on <a href="https://github.com/ishaanyadav-techhelp/kingbob" target="_blank">GitHub</a></p>
        </footer>
    </div>
</body>
</html>
